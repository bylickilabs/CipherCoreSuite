name: CipherCore Suite Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Release Build erstellen
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onefile --name CipherCoreSuite --icon assets/ciphercore.ico --version-file version_info.txt --exclude-module torch --exclude-module functorch --exclude-module tensorflow --exclude-module matplotlib --exclude-module pandas --exclude-module pyarrow --exclude-module sqlalchemy run.py

      - name: Release Artefakt hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CipherCoreSuite.exe
